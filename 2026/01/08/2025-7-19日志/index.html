    <h1>2025-7-19日志</h1>
    <time datetime="2026-01-08T10:08:04.548Z">2026-01-08 18:08</time>
  </header>

  
    <div class="article-content"><p>很少见的一觉睡了10个小时，可能确实是因为被导师抽查进度的噩梦过于可怕导致不敢醒。醒来之后倒是精力充沛，很罕见的处在活着状态，于是随便扒拉了两口饭就背着无人机坐上了去石臼湖的地铁。</p>
<span id="more"></span>

<p>嘎嘎出片啊真的，太有意义的一天，除了中途被狗追的非常狼狈以外。嘎嘎放38张图片上来，我真的很不会挑照片了，某种意义上Blog在这个角度上薄纱朋友圈了。无人机的还没放，经典的拍完懒得剪懒得选。</p>
